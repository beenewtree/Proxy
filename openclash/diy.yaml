# ============================================================
# OpenClash Mixin 配置文件
# 适用位置：OpenClash → 配置文件 → Mixin 设置 → diy.yaml
# 功能：覆写策略组(proxy-groups) + 规则(rules)
# 配合机场订阅使用，节点由订阅自动提供
# ============================================================

# -----------------------------------------------------------
# 策略组
# -----------------------------------------------------------
proxy-groups:

  # ─── 🚀 顶级入口 ──────────────────────────────────────
  - name: "🚀 Proxy"
    type: select
    proxies:
      - "♻️ 故障转移"
      - "🎯 自动选择"
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇺🇸 美国"
      - "🇸🇬 新加坡"
      - "🇹🇼 台湾"
      - "🇰🇷 韩国"
      - "🇦🇺 澳大利亚"
      - DIRECT
      - REJECT

  # ─── ♻️ 故障转移（稳定优先）────────────────────────────
  - name: "♻️ 故障转移"
    type: fallback
    proxies:
      - "🇺🇸 美国"
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇹🇼 台湾"
      - "🇰🇷 韩国"
      - "🇦🇺 澳大利亚"
      - DIRECT
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5

  # ─── 🎯 自动选择（url-test 测速兜底）───────────────────
  - name: "🎯 自动选择"
    type: url-test
    include-all: true
    url: "https://www.gstatic.com/generate_204"
    interval: 600
    tolerance: 30
    timeout: 5
    lazy: true

  # ─── 🇭🇰 香港 ──────────────────────────────────────────
  - name: "🇭🇰 香港"
    type: select
    include-all: true
    filter: "^(?=.*🇭🇰)"
    proxies:
      - "🎯 自动选择"
      - "♻️ 故障转移"
      - DIRECT

  # ─── 🇯🇵 日本 ──────────────────────────────────────────
  - name: "🇯🇵 日本"
    type: select
    include-all: true
    filter: "^(?=.*🇯🇵)"
    proxies:
      - "🎯 自动选择"
      - "♻️ 故障转移"
      - DIRECT

  # ─── 🇺🇸 美国 ──────────────────────────────────────────
  - name: "🇺🇸 美国"
    type: select
    include-all: true
    filter: "^(?=.*🇺🇸)"
    proxies:
      - "🎯 自动选择"
      - "♻️ 故障转移"
      - DIRECT

  # ─── 🇸🇬 新加坡 ────────────────────────────────────────
  - name: "🇸🇬 新加坡"
    type: select
    include-all: true
    filter: "^(?=.*🇸🇬)"
    proxies:
      - "🎯 自动选择"
      - "♻️ 故障转移"
      - DIRECT

  # ─── 🇹🇼 台湾 ──────────────────────────────────────────
  - name: "🇹🇼 台湾"
    type: select
    include-all: true
    filter: "^(?=.*🇹🇼|.*台湾|.*TW)"
    proxies:
      - "🎯 自动选择"
      - "♻️ 故障转移"
      - DIRECT

  # ─── 🇰🇷 韩国 ──────────────────────────────────────────
  - name: "🇰🇷 韩国"
    type: select
    include-all: true
    filter: "^(?=.*🇰🇷|.*韩国|.*KR)"
    proxies:
      - "🎯 自动选择"
      - "♻️ 故障转移"
      - DIRECT

  # ─── 🇦🇺 澳大利亚 ──────────────────────────────────────
  - name: "🇦🇺 澳大利亚"
    type: select
    include-all: true
    filter: "^(?=.*🇦🇺|.*澳大利亚|.*AU)"
    proxies:
      - "🎯 自动选择"
      - "♻️ 故障转移"
      - DIRECT

  # ─── 📺 流媒体（YouTube / Netflix / Disney+ / Spotify 等）
  - name: "📺 流媒体"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🎯 自动选择"
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - DIRECT

  # ─── 🤖 AI 服务（ChatGPT / Gemini / Claude / Perplexity 等）
  - name: "🤖 AI服务"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🎯 自动选择"
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - DIRECT

  # ─── ✈️ Telegram ──────────────────────────────────────
  - name: "✈️ Telegram"
    type: select
    proxies:
      - "🎯 自动选择"
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - DIRECT

  # ─── 🍎 Apple 服务 ────────────────────────────────────
  - name: "🍎 Apple"
    type: select
    proxies:
      - DIRECT
      - "🎯 自动选择"
      - "🇭🇰 香港"

