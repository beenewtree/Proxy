# ============================================================
# 规则 — 自定义规则优先，GEOSITE/GEOIP 兜底
# ============================================================
rules:

  # ─── 自定义规则（优先生效）─────────────────────────────
  # 格式：- DOMAIN-SUFFIX,域名,策略组名
  # 需要追加规则时直接加在这里，改一处所有设备同步
  # 例如：
  # - DOMAIN-SUFFIX,netflix.com,🎥 Netflix
  # - DOMAIN-SUFFIX,github.com,😺 GitHub
  # - DOMAIN-SUFFIX,bilibili.com,📺 哔哩哔哩

  # ─── 国内网站直连（GEOSITE 自动匹配）────────────────
  - GEOSITE,cn,DIRECT

  # ─── 国内 IP 直连 ─────────────────────────────────────
  - GEOIP,CN,DIRECT

  # ─── 漏网之鱼 → 主策略组 ─────────────────────────────
  - MATCH,🚀 Proxy