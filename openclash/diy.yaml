  # ─── 🇭🇰 香港 ──────────────────────────────────────────
  - name: "🇭🇰 香港"
    type: select
    include-all: true
    filter: "🇭🇰"
    proxies: ["DIRECT"]

  # ─── 🇯🇵 日本 ──────────────────────────────────────────
  - name: "🇯🇵 日本"
    type: select
    include-all: true
    filter: "🇯🇵"
